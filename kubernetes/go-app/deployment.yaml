apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-go-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-go-app
  template:
    metadata:
      labels:
        app: my-go-app
    spec:  
      containers:
        - name: my-go-app
          image: my-go-app
          imagePullPolicy: Never
          ports:
           - containerPort: 8080

